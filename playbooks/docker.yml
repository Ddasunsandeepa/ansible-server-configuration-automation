---
- name: Install Docker on Ubuntu Servers
  hosts: all
  become: true

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable Docker
      service:
        name: docker
        enabled: yes

    - name: Start Docker
      service:
        name: docker
        state: started

    - name: Verify Docker Version
      command: docker --version
      register: docker_version
      changed_when: false

    - debug:
        var: docker_version.stdout