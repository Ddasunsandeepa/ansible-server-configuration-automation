---
- name: Install and Configure Nginx
  hosts: webservers
  become: true

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Nginx
      apt:
        name: "{{ nginx_package }}"
        state: "{{ package_state }}"

    - name: Enable Nginx
      service:
        name: nginx
        enabled: yes

    - name: Start Nginx
      service:
        name: nginx
        state: started

    - name: Verify Nginx Service
      command: systemctl status nginx
      register: nginx_status
      changed_when: false

    - debug:
        var: nginx_status.stdout_lines