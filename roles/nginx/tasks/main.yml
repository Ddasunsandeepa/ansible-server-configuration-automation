---
- name: Install Nginx
  apt:
    name: "{{ nginx_package }}"
    state: present

- name: Enable Nginx
  service:
    name: nginx
    enabled: yes

- name: Start Nginx
  service:
    name: nginx
    state: started

- name: Deploy Custom Web Page
  template:
    src: index.html.j2
    dest: /var/www/html/index.html
  notify: Restart nginx